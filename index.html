<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Pilot - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKの読み込み -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Reactから使えるように準備
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // ★★★ ここにFirebaseの画面でコピーした設定コードを貼り付けます ★★★
        const firebaseConfig = {
            apiKey: "AIzaSyARvTLUOjWBwMVV9n98Z8BzZnZ7BnVPlCw",
            authDomain: "moneybuddy-6fe1a.firebaseapp.com",
            projectId: "moneybuddy-6fe1a",
            storageBucket: "moneybuddy-6fe1a.firebasestorage.app",
            messagingSenderId: "277966072663",
            appId: "1:277966072663:web:8573be58bf88d8288a2c12"
        };
        // ★★★ ここまで ★★★

        const defaultCategoryMapping = {
            '食費': 'needs', '交通費': 'needs', '日用品': 'needs', '家具家電': 'needs',
            '美容/健康': 'investment', '本': 'investment',
            'タバコ': 'wants', 'ファッション': 'wants', 'ゲーム': 'wants', '外食費': 'wants',
            '遊興費': 'wants', '映画': 'wants', '趣味': 'wants', 'サブスクリプション': 'wants'
        };

        const categoryLabels = {
            needs: { label: '必要な支出', color: 'bg-green-500', text: 'text-green-700' },
            wants: { label: '浪費', color: 'bg-red-500', text: 'text-red-700' },
            investment: { label: '投資', color: 'bg-blue-500', text: 'text-blue-700' }
        };

        // 日付文字列（2026/03/26など）から「2026年03月」を作る関数
        const getMonthString = (dateString) => {
            if (!dateString) return '不明';
            const parts = dateString.split(/[\/\-]/);
            if (parts.length >= 2) {
                const year = parts[0];
                const month = parts[1].padStart(2, '0');
                return `${year}年${month}月`;
            }
            return '不明';
        };

        // 日付文字列から「2026年」を作る関数
        const getYearString = (dateString) => {
            if (!dateString) return '不明';
            const parts = dateString.split(/[\/\-]/);
            if (parts.length >= 1) {
                return `${parts[0]}年`;
            }
            return '不明';
        };

        // 個別明細用のユニークID生成関数
        const generateId = () => {
            return typeof crypto !== 'undefined' && crypto.randomUUID 
                ? crypto.randomUUID() 
                : `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
        };

        let app, auth, db;
        function MainApp({ config }) {
            const [user, setUser] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [categoryMapping, setCategoryMapping] = useState(defaultCategoryMapping);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [selectedDetailType, setSelectedDetailType] = useState(null);
            const [expandedCategory, setExpandedCategory] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [viewMode, setViewMode] = useState('month'); 
            const [selectedMonth, setSelectedMonth] = useState(''); 
            const [selectedYear, setSelectedYear] = useState(''); 

            useEffect(() => {
                const initFirebase = async () => {
                    const fb = window.FirebaseSDK;
                    if (!app) {
                        app = fb.initializeApp(config);
                        auth = fb.getAuth(app);
                        db = fb.getFirestore(app);
                    }
                    try {
                        await fb.signInAnonymously(auth);
                    } catch (error) {
                        console.error("Login Error:", error);
                    }
                    fb.onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (!u) setIsLoading(false);
                    });
                };
                initFirebase();
            }, [config]);

            useEffect(() => {
                if (!user) return;
                const fb = window.FirebaseSDK;
                const userDocRef = fb.doc(db, 'artifacts', config.projectId, 'users', user.uid, 'settings', 'main');
                
                const unsubscribe = fb.onSnapshot(userDocRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        setExpenses(data.expenses || []);
                        setCategoryMapping(data.mapping || defaultCategoryMapping);
                    }
                    setIsLoading(false);
                }, (error) => {
                    console.error("Firestore Listen Error:", error);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user, config.projectId]);

            const saveData = async (newExpenses, newMapping) => {
                if (!user) return;
                const fb = window.FirebaseSDK;
                const userDocRef = fb.doc(db, 'artifacts', config.projectId, 'users', user.uid, 'settings', 'main');
                try {
                    await fb.setDoc(userDocRef, {
                        expenses: newExpenses,
                        mapping: newMapping,
                        updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (error) {
                    console.error("Error saving data: ", error);
                    alert("クラウドへの保存に失敗しました。");
                }
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.trim().split(/\r\n|\n|\r/);
                    const parsedData = [];
                    
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue; 
                        
                        const values = line.split(',');
                        if (values.length >= 4) {
                            const cleanAmountStr = values[0].replace(/"/g, '').trim();
                            const amount = parseInt(cleanAmountStr, 10);
                            
                            if (!isNaN(amount)) {
                                parsedData.push({
                                    id: generateId(), // 更新用にIDを付与
                                    amount: Math.abs(amount),
                                    date: values[1].replace(/"/g, '').trim(),
                                    memo: values[2].replace(/"/g, '').trim(),
                                    category: values[3].replace(/"/g, '').trim()
                                    // manualType: 個別分類（未設定の場合はここには追加しない）
                                });
                            }
                        }
                    }
                    
                    if (parsedData.length > 0) {
                        parsedData.sort((a, b) => new Date(b.date) - new Date(a.date));
                        await saveData(parsedData, categoryMapping);
                        alert(`${parsedData.length}件のデータを読み込みました！`);
                    } else {
                        alert("データを読み込めませんでした。CSVの形式が正しいか確認してください。");
                    }
                    event.target.value = '';
                };
                reader.readAsText(file);
            };

            const handleCategoryChange = async (category, newType) => {
                const updatedMapping = { ...categoryMapping, [category]: newType };
                setCategoryMapping(updatedMapping);
                await saveData(expenses, updatedMapping);
            };

            // 個別の明細の分類を取得する関数（個別設定優先）
            const getExpenseType = useCallback((exp) => {
                if (exp.manualType) return exp.manualType;
                return categoryMapping[exp.category] || 'needs';
            }, [categoryMapping]);

            // 個別の明細の分類を変更・保存する関数
            const handleExpenseTypeChange = async (targetExp, newType) => {
                const defaultType = categoryMapping[targetExp.category] || 'needs';
                
                const newExpenses = expenses.map(exp => {
                    const isMatch = exp.id 
                        ? exp.id === targetExp.id 
                        : (exp.date === targetExp.date && exp.amount === targetExp.amount && exp.memo === targetExp.memo && exp.category === targetExp.category);
                    
                    if (isMatch) {
                        const updatedExp = { ...exp };
                        if (newType === defaultType) {
                            delete updatedExp.manualType;
                        } else {
                            updatedExp.manualType = newType;
                        }
                        return updatedExp;
                    }
                    return exp;
                });
                
                setExpenses(newExpenses);
                await saveData(newExpenses, categoryMapping);
            };

            const availableMonths = useMemo(() => {
                const months = new Set();
                expenses.forEach(exp => months.add(getMonthString(exp.date)));
                return Array.from(months).sort().reverse();
            }, [expenses]);

            const availableYears = useMemo(() => {
                const years = new Set();
                expenses.forEach(exp => years.add(getYearString(exp.date)));
                return Array.from(years).sort().reverse();
            }, [expenses]);

            useEffect(() => {
                if (availableMonths.length > 0 && (!selectedMonth || !availableMonths.includes(selectedMonth))) {
                    setSelectedMonth(availableMonths[0]);
                }
                if (availableYears.length > 0 && (!selectedYear || !availableYears.includes(selectedYear))) {
                    setSelectedYear(availableYears[0]);
                }
            }, [availableMonths, availableYears, selectedMonth, selectedYear]);

            const filteredExpenses = useMemo(() => {
                if (viewMode === 'month') {
                    if (!selectedMonth) return [];
                    return expenses.filter(exp => getMonthString(exp.date) === selectedMonth);
                } else {
                    if (!selectedYear) return [];
                    return expenses.filter(exp => getYearString(exp.date) === selectedYear);
                }
            }, [expenses, selectedMonth, selectedYear, viewMode]);

            const currentMonthData = useMemo(() => {
                const summary = { needs: 0, wants: 0, investment: 0 };
                filteredExpenses.forEach(exp => {
                    const type = getExpenseType(exp);
                    summary[type] += exp.amount;
                });
                return summary;
            }, [filteredExpenses, getExpenseType]);

            const groupedExpenses = useMemo(() => {
                if (!selectedDetailType) return [];
                const filtered = filteredExpenses.filter(exp => getExpenseType(exp) === selectedDetailType);
                const grouped = {};
                filtered.forEach(exp => {
                    if (!grouped[exp.category]) {
                        grouped[exp.category] = { total: 0, items: [] };
                    }
                    grouped[exp.category].total += exp.amount;
                    grouped[exp.category].items.push(exp);
                });
                return Object.entries(grouped).sort((a, b) => b[1].total - a[1].total);
            }, [filteredExpenses, getExpenseType, selectedDetailType]);

            if (isLoading) return <div className="flex items-center justify-center h-screen text-gray-500">クラウドと通信中...</div>;

            return (
                <div className="min-h-screen flex justify-center font-sans pb-20">
                    <div className="w-full max-w-md bg-white shadow-lg relative min-h-screen">
                        <header className="bg-white text-center border-b sticky top-0 z-20">
                            <div className="p-4">
                                <h1 className="text-xl font-bold text-gray-800 tracking-tight">Money Pilot ☁️</h1>
                                <div className="mt-3">
                                    <label className="inline-block bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2 px-6 rounded-full cursor-pointer shadow-md transition">
                                        <span>CSVをクラウドに同期する</span>
                                        <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                </div>
                                {user && <p className="text-[10px] text-gray-400 mt-2">ID: {user.uid}</p>}
                            </div>

                            <div className="flex bg-white">
                                <button 
                                    className={`flex-1 py-3 text-sm font-bold transition ${viewMode === 'month' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}
                                    onClick={() => setViewMode('month')}
                                >
                                    月間
                                </button>
                                <button 
                                    className={`flex-1 py-3 text-sm font-bold transition ${viewMode === 'year' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}
                                    onClick={() => setViewMode('year')}
                                >
                                    年間
                                </button>
                            </div>
                            
                            {viewMode === 'month' && availableMonths.length > 0 && (
                                <div className="bg-gray-50 flex justify-between items-center px-4 py-2 border-b">
                                    <button 
                                        onClick={() => {
                                            const idx = availableMonths.indexOf(selectedMonth);
                                            if (idx < availableMonths.length - 1) setSelectedMonth(availableMonths[idx + 1]);
                                        }}
                                        disabled={availableMonths.indexOf(selectedMonth) === availableMonths.length - 1}
                                        className="text-gray-600 disabled:opacity-30 p-2 text-sm font-bold"
                                    >
                                        ◀ 前月
                                    </button>
                                    <div className="font-bold text-gray-800 text-lg">
                                        {selectedMonth}
                                    </div>
                                    <button 
                                        onClick={() => {
                                            const idx = availableMonths.indexOf(selectedMonth);
                                            if (idx > 0) setSelectedMonth(availableMonths[idx - 1]);
                                        }}
                                        disabled={availableMonths.indexOf(selectedMonth) <= 0}
                                        className="text-gray-600 disabled:opacity-30 p-2 text-sm font-bold"
                                    >
                                        次月 ▶
                                    </button>
                                </div>
                            )}

                            {viewMode === 'year' && availableYears.length > 0 && (
                                <div className="bg-gray-50 flex justify-between items-center px-4 py-2 border-b">
                                    <button 
                                        onClick={() => {
                                            const idx = availableYears.indexOf(selectedYear);
                                            if (idx < availableYears.length - 1) setSelectedYear(availableYears[idx + 1]);
                                        }}
                                        disabled={availableYears.indexOf(selectedYear) === availableYears.length - 1}
                                        className="text-gray-600 disabled:opacity-30 p-2 text-sm font-bold"
                                    >
                                        ◀ 前年
                                    </button>
                                    <div className="font-bold text-gray-800 text-lg">
                                        {selectedYear}
                                    </div>
                                    <button 
                                        onClick={() => {
                                            const idx = availableYears.indexOf(selectedYear);
                                            if (idx > 0) setSelectedYear(availableYears[idx - 1]);
                                        }}
                                        disabled={availableYears.indexOf(selectedYear) <= 0}
                                        className="text-gray-600 disabled:opacity-30 p-2 text-sm font-bold"
                                    >
                                        次年 ▶
                                    </button>
                                </div>
                            )}
                        </header>

                        <div className="p-4 space-y-6">
                            <div className="bg-white rounded-xl border p-5 shadow-sm">
                                <h2 className="text-lg font-bold mb-4 text-gray-700 border-b pb-2">
                                    {viewMode === 'month' ? (selectedMonth ? `${selectedMonth}の支出バランス` : '今月の支出バランス') : (selectedYear ? `${selectedYear}の支出バランス` : '今年の支出バランス')}
                                </h2>
                                {['needs', 'wants', 'investment'].map(type => {
                                    const current = currentMonthData[type];
                                    const target = viewMode === 'year' ? 50000 * 12 : 50000;
                                    const percent = Math.min((current / target) * 100, 100) || 0;
                                    return (
                                        <div 
                                            key={type} 
                                            className="mb-4 cursor-pointer hover:bg-gray-50 p-2 -mx-2 rounded-lg transition"
                                            onClick={() => setSelectedDetailType(type)}
                                        >
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className={`font-bold ${categoryLabels[type].text}`}>{categoryLabels[type].label}</span>
                                                <span className="text-gray-600">
                                                    {current.toLocaleString()}円 
                                                    <span className="text-xs text-gray-400 ml-1">▶</span>
                                                </span>
                                            </div>
                                            <div className="w-full h-3 bg-gray-100 rounded-full overflow-hidden">
                                                <div className={`h-full ${categoryLabels[type].color}`} style={{ width: `${percent}%` }} />
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div>
                                <h3 className="text-md font-bold text-gray-700 mb-3 px-1">
                                    {viewMode === 'month' ? (selectedMonth ? `${selectedMonth}の支出履歴` : '支出履歴') : (selectedYear ? `${selectedYear}の支出履歴` : '支出履歴')}
                                </h3>
                                <div className="space-y-2">
                                    {filteredExpenses.length === 0 && <p className="text-sm text-gray-500">まだデータがありません。CSVをアップロードしてください。</p>}
                                    {filteredExpenses.slice(0, 10).map((exp, idx) => {
                                        const type = getExpenseType(exp);
                                        const isManual = !!exp.manualType;
                                        return (
                                            <div key={exp.id || idx} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg text-sm border">
                                                <div className="flex items-center space-x-3 flex-1 overflow-hidden">
                                                    <span className={`w-3 h-3 rounded-full ${categoryLabels[type].color} shrink-0`}></span>
                                                    <div className="truncate">
                                                        <div className="font-medium text-gray-700 truncate">{exp.category}</div>
                                                        <div className="text-xs text-gray-500">{exp.date}</div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-end space-y-1 ml-2 shrink-0">
                                                    <div className="font-bold text-gray-700">¥{exp.amount.toLocaleString()}</div>
                                                    <select 
                                                        value={type} 
                                                        onChange={(e) => handleExpenseTypeChange(exp, e.target.value)}
                                                        className={`text-[10px] border rounded px-1.5 py-0.5 outline-none font-medium cursor-pointer transition ${
                                                            isManual ? 'bg-yellow-50 border-yellow-300 text-yellow-800' : 'bg-white border-gray-300 text-gray-600'
                                                        }`}
                                                    >
                                                        <option value="needs">必要な支出</option>
                                                        <option value="wants">浪費</option>
                                                        <option value="investment">投資</option>
                                                    </select>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="fixed bottom-0 w-full max-w-md bg-white border-t p-3">
                            <button onClick={() => setIsSettingsOpen(true)} className="w-full bg-gray-100 py-3 rounded-xl font-semibold text-gray-700 shadow-sm">
                                カテゴリー全体の設定
                            </button>
                        </div>

                        {isSettingsOpen && (
                            <div className="absolute inset-0 bg-black bg-opacity-50 z-30 flex items-end">
                                <div className="bg-white w-full rounded-t-3xl p-5 pb-10 max-h-[80vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h3 className="text-lg font-bold">カテゴリー全体の設定</h3>
                                        <button onClick={() => setIsSettingsOpen(false)} className="text-gray-500 text-xl px-2">✕</button>
                                    </div>
                                    <p className="text-xs text-gray-500 mb-4">※個別の明細で分類を変更している場合、そちらが優先されます。</p>
                                    <div className="space-y-4 mb-8">
                                        {Object.keys(categoryMapping).map(cat => (
                                            <div key={cat} className="flex items-center justify-between border-b border-gray-100 pb-2">
                                                <span className="font-medium text-gray-700">{cat}</span>
                                                <select
                                                    value={categoryMapping[cat]}
                                                    onChange={(e) => handleCategoryChange(cat, e.target.value)}
                                                    className="text-sm p-2 rounded-lg border bg-white cursor-pointer"
                                                >
                                                    <option value="needs">必要な支出</option>
                                                    <option value="wants">浪費</option>
                                                    <option value="investment">投資</option>
                                                </select>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {selectedDetailType && (
                            <div className="absolute inset-0 bg-black bg-opacity-50 z-30 flex items-end">
                                <div className="bg-white w-full rounded-t-3xl p-5 pb-10 max-h-[80vh] flex flex-col">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2 shrink-0">
                                        <h3 className={`text-lg font-bold ${categoryLabels[selectedDetailType].text}`}>
                                            {categoryLabels[selectedDetailType].label}の内訳
                                        </h3>
                                        <button onClick={() => { setSelectedDetailType(null); setExpandedCategory(null); }} className="text-gray-500 text-xl px-2">✕</button>
                                    </div>
                                    <div className="overflow-y-auto space-y-3 flex-1">
                                        {groupedExpenses.map(([categoryName, data]) => (
                                            <div key={categoryName} className="border rounded-xl overflow-hidden shadow-sm">
                                                <div 
                                                    className="flex justify-between items-center bg-gray-50 p-4 cursor-pointer hover:bg-gray-100 transition"
                                                    onClick={() => setExpandedCategory(expandedCategory === categoryName ? null : categoryName)}
                                                >
                                                    <div className="font-bold text-gray-700 flex items-center">
                                                        {categoryName}
                                                        <span className="text-xs ml-2 text-gray-400 bg-white px-2 py-0.5 rounded-full border">{data.items.length}件</span>
                                                    </div>
                                                    <div className="flex items-center space-x-2">
                                                        <div className="font-bold text-gray-800">¥{data.total.toLocaleString()}</div>
                                                        <span className="text-gray-400 text-xs">{expandedCategory === categoryName ? '▲' : '▼'}</span>
                                                    </div>
                                                </div>

                                                {expandedCategory === categoryName && (
                                                    <div className="bg-white border-t divide-y">
                                                        {data.items.map((exp, idx) => {
                                                            const type = getExpenseType(exp);
                                                            const isManual = !!exp.manualType;
                                                            return (
                                                                <div key={exp.id || idx} className="flex justify-between items-center p-3 text-sm">
                                                                    <div className="pl-2 border-l-2 border-blue-400 flex-1 overflow-hidden">
                                                                        <div className="text-xs text-gray-500">{exp.date}</div>
                                                                        {exp.memo && <div className="text-gray-700 mt-0.5 truncate">{exp.memo}</div>}
                                                                    </div>
                                                                    <div className="flex flex-col items-end space-y-1 ml-2 shrink-0">
                                                                        <div className="text-gray-600 font-bold">¥{exp.amount.toLocaleString()}</div>
                                                                        <select 
                                                                            value={type} 
                                                                            onChange={(e) => handleExpenseTypeChange(exp, e.target.value)}
                                                                            className={`text-[10px] border rounded px-1.5 py-0.5 outline-none font-medium cursor-pointer transition ${
                                                                                isManual ? 'bg-yellow-50 border-yellow-300 text-yellow-800' : 'bg-white border-gray-300 text-gray-600'
                                                                            }`}
                                                                        >
                                                                            <option value="needs">必要</option>
                                                                            <option value="wants">浪費</option>
                                                                            <option value="investment">投資</option>
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {groupedExpenses.length === 0 && (
                                            <p className="text-sm text-gray-500 text-center py-4">この項目のデータがありません</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(!!window.FirebaseSDK);

            useEffect(() => {
                if (!window.FirebaseSDK) {
                    const handleLoad = () => setIsFirebaseLoaded(true);
                    window.addEventListener('firebase-loaded', handleLoad);
                    return () => window.removeEventListener('firebase-loaded', handleLoad);
                }
            }, []);

            if (!isFirebaseLoaded) return <div className="p-10 text-center text-gray-500">システム準備中...</div>;
            
            if (firebaseConfig.apiKey === "YOUR_API_KEY") {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50">
                        <div className="bg-white p-6 rounded-xl shadow border-l-4 border-red-500 max-w-md">
                            <h2 className="text-lg font-bold text-red-600 mb-2">設定が必要です</h2>
                            <p className="text-sm text-gray-700">
                                ソースコードの30行目付近にある <code>firebaseConfig</code> の中身を、Firebaseから取得したコードに書き換えてください。
                            </p>
                        </div>
                    </div>
                );
            }

            return <MainApp config={firebaseConfig} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
